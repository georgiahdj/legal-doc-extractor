services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    networks:
      - app_network
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama
    container_name: ollama_init
    depends_on:
      - ollama
    networks:
      - app_network
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        ollama pull qwen2.5vl:3b &&
        echo 'Model ready!'
      "
    restart: "no"

  app:
    build: .
    container_name: streamlit_app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  ollama_data: